<!DOCTYPE html>
<html lang="ko-kr">
  <head>
    <!-- encoding -->
    <meta charset="utf-8" />  
    
    <!-- setting view -->
    <meta name="viewport" content="width=device-width, initial-scale=1" />  
    
    <!-- setting theme color -->
    <meta name="theme-color" content="#000000" /> 
    
    <!-- site description -->
    <meta
      name="description"
      content="JungHoSung Portfolio"
    />  

    <!-- setting favicon -->
    <link rel="icon" sizes="16x16" href="/favicon/favicon-16x16.png" />
    <link rel="icon" sizes="32x32" href="/favicon/favicon-32x32.png" />
    <link rel="icon" sizes="48x48" href="/favicon/favicon-48x48.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    
    <!-- site title -->
    <title>JHS Portfolio</title>

    <!-- setting background style -->
    <style>
      body {
        background-color: #121E58;
      }
      .circle {
        position: absolute;
        border-radius: 50%;
        background-color: white;
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      function createRandomCircles() {
        const circle = document.createElement("div");
        const size = Math.random() * 50 + 20;
        const left = Math.random() * window.innerWidth;
        const Top = Math.random() * window.innerHeight;
        const delay = Math.random() * 5;
        const dx = (Math.random() - 0.5) * 2;
        const dy = (Math.random() - 0.5) * 2;

        circle.classList.add('circle');
        circle.style.width = `${size}px`;
        circle.style.height = `${size}px`;
        circle.style.left = `${left}px`;
        circle.style.top = `${top}px`;
        circle.style.animationDelay = `${delay}s`;
        circle.style.borderRadius = '50%';
        circle.style.transition = `transform ${delay}s ease, opacity ${delay}s ease`;
        circle.style.transform = `scale(1) translate(${dx * 100}px, ${dy * 100}px)`;

        document.body.appendChild(circle);

        setTimeout(() => {
          circle.style.transform = `scale(0) translate(${dx * 100}px, ${dy * 100}px)`;
        }, 0);

        setTimeout(() => {
          circle.remove();
        }, delay * 1000);
      }

      function generateCircles() {
        setInterval(createRandomCircles, Math.random() * 300);
      }

      function createInitialCircles() {
        for (let i = 0; i < 10; i++) {
          createRandomCircles();
        }
      }

      window.onload = function() {
        createInitialCircles();
        generateCircles();
      }
    </script>
  </body>
</html>
